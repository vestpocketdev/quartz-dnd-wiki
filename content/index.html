<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Come Forthe — Campaigns Index</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --ink:        oklch(0.13 0.008 60);
    --ink-2:      oklch(0.17 0.010 60);
    --ink-3:      oklch(0.21 0.012 60);
    --rule:       oklch(0.32 0.014 70);
    --vellum:     oklch(0.86 0.040 80);
    --vellum-dim: oklch(0.66 0.035 78);
    --vellum-mute:oklch(0.48 0.028 75);
    --gilt:       oklch(0.72 0.110 78);
    --gilt-dim:   oklch(0.55 0.085 75);
    --blood:      oklch(0.52 0.140 28);
    --blood-dim:  oklch(0.40 0.110 28);
    --bone:       oklch(0.92 0.020 85);

    --serif:   "EB Garamond", "Iowan Old Style", Georgia, serif;
    --black:   "UnifrakturCook", "UnifrakturMaguntia", "EB Garamond", serif;
    --caps:    "Cormorant SC", "EB Garamond", serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: var(--serif);
    background: var(--ink);
    color: var(--vellum);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background-image:
      radial-gradient(circle at 78% -10%, oklch(0.32 0.08 70 / 0.35), transparent 55%),
      radial-gradient(circle at 12% 110%, oklch(0.22 0.05 30 / 0.30), transparent 55%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.85  0 0 0 0 0.55  0 0 0 0.045 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    background-attachment: fixed;
  }

  /* candle vignette */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 38%, transparent 0%, transparent 45%, oklch(0.06 0.005 60 / 0.55) 100%);
    z-index: 0;
  }

  ::selection { background: var(--blood); color: var(--bone); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--ink); }
  ::-webkit-scrollbar-thumb { background: var(--ink-3); border: 2px solid var(--ink); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gilt-dim); }

  /* anchor */
  a { color: inherit; text-decoration: none; }

  /* utility focus */
  :focus-visible {
    outline: 1px solid var(--gilt);
    outline-offset: 3px;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ornaments.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
